# Nginx конфигурация для Blue-Green деплоя
# Переключение трафика: меняем ACTIVE_ENV=blue или ACTIVE_ENV в /etc/nginx/conf.d/active.conf

events {
    worker_connections 1024;
}

http {
    # Blue окружение
    upstream frontend_blue {
        server frontend-blue:3000;
    }

    upstream content_blue {
        server content-blue:8011;
    }

    # Green окружение
    upstream frontend_green {
        server frontend-green:3000;
    }

    upstream content_green {
        server content-green:8011;
    }

    # Активное окружение — меняется скриптом deploy.sh
    # Файл /etc/nginx/conf.d/active.conf содержит:
    #   set $active_env "blue";  или  set $active_env "green";
    #
    # По умолчанию — blue
    map $active_env $frontend_upstream {
        blue    frontend_blue;
        green   frontend_green;
    }

    map $active_env $content_upstream {
        blue    content_blue;
        green   content_green;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # Страница здоровья самого nginx
        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Страница для проверки активного окружения
        location /active-env {
            return 200 '{"active": "$active_env"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://$content_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://$content_upstream;
            proxy_set_header Host $host;
        }
    }
}
