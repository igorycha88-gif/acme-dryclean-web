events {
    worker_connections 1024;
}

http {

    upstream frontend_blue {
        server 127.0.0.1:3000;
    }

    upstream content_blue {
        server 127.0.0.1:8011;
    }

    upstream frontend_green {
        server 127.0.0.1:3001;
    }

    upstream content_green {
        server 127.0.0.1:8012;
    }

    upstream tracking_blue {
        server 127.0.0.1:8020;
    }

    map $host $active_env {
        default blue;
    }

    map $active_env $frontend_upstream {
        default frontend_green;
        blue    frontend_blue;
        green   frontend_green;
    }

    map $active_env $content_upstream {
        default content_green;
        blue    content_blue;
        green   content_green;
    }

    map $active_env $tracking_upstream {
        default tracking_blue;
        blue    tracking_blue;
        green   tracking_blue;
    }

    server {
        listen 80;
        server_name da-dryclean.ru www.da-dryclean.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://da-dryclean.ru$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name www.da-dryclean.ru;

        ssl_certificate /etc/letsencrypt/live/da-dryclean.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/da-dryclean.ru/privkey.pem;

        return 301 https://da-dryclean.ru$request_uri;
    }

    server {
        listen 443 ssl;
        server_name da-dryclean.ru;

        ssl_certificate /etc/letsencrypt/live/da-dryclean.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/da-dryclean.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        client_max_body_size 50M;

        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /active-env {
            return 200 '{"active": "$active_env"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/price-list {
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/tracking/ {
            proxy_pass http://$tracking_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://$content_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://$content_upstream;
            proxy_set_header Host $host;
        }
    }
}
