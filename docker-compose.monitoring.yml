networks:
  monitor-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    networks:
      monitor-net:
        ipv4_address: 172.30.0.10
    ports:
      - "9090:9090"
    volumes:
      - /opt/app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    networks:
      monitor-net:
        ipv4_address: 172.30.0.20
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=dryclean2026
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/app/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/app/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  prometheus_data:
  grafana_data:
