services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_CONTENT_API_URL=http://localhost
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dryclean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dryclean_prod}
      POSTGRES_DB: ${POSTGRES_DB:-dryclean_content}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dryclean}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dryclean}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-dryclean_prod}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  content:
    build:
      context: ./backend/services/content
      dockerfile: Dockerfile
    expose:
      - "8011"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dryclean}:${POSTGRES_PASSWORD:-dryclean_prod}@postgres:5432/${POSTGRES_DB:-dryclean_content}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-dryclean}:${POSTGRES_PASSWORD:-dryclean_prod}@postgres:5432/${POSTGRES_DB:-dryclean_content}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - content_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - content
    restart: unless-stopped

volumes:
  postgres_data:
  content_uploads:
