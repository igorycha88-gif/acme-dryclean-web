name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for deployment"
        required: false
        default: "Manual deployment"
      skip_deploy:
        description: "Skip deploy (CI only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository_owner }}/dryclean/frontend
  CONTENT_IMAGE: ${{ github.repository_owner }}/dryclean/content
  TRACKING_IMAGE: ${{ github.repository_owner }}/dryclean/tracking

jobs:
  ci:
    name: CI Pipeline
    if: github.event_name != 'workflow_dispatch' || !inputs.skip_deploy
    uses: ./.github/workflows/ci.yml
    with:
      run-coverage: false

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 25

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      short_sha: ${{ steps.image.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=/api
            NEXT_PUBLIC_CONTENT_API_URL=/api/content
            NEXT_PUBLIC_TRACKING_API_URL=

      - name: Build and push content service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/content
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.CONTENT_IMAGE }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.CONTENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push tracking service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/tracking
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.TRACKING_IMAGE }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.TRACKING_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS (Blue-Green)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && !inputs.skip_deploy
    environment: production
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Verify images exist
        timeout-minutes: 3
        run: |
          TAG="${{ needs.docker.outputs.image_tag }}"
          FRONTEND="${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${TAG}"
          CONTENT="${{ env.REGISTRY }}/${{ env.CONTENT_IMAGE }}:${TAG}"
          TRACKING="${{ env.REGISTRY }}/${{ env.TRACKING_IMAGE }}:${TAG}"
          echo "Verifying: $FRONTEND"
          docker pull "$FRONTEND" --quiet || { echo "::error::Frontend image not found"; exit 1; }
          echo "Verifying: $CONTENT"
          docker pull "$CONTENT" --quiet || { echo "::error::Content image not found"; exit 1; }
          echo "Verifying: $TRACKING"
          docker pull "$TRACKING" --quiet || { echo "::warning::Tracking image not found"; }
          echo "All images verified"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 25
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail

            export GITHUB_REPOSITORY="${{ github.repository }}"
            export GITHUB_ACTOR="${{ github.actor }}"
            export IMAGE_TAG="${{ needs.docker.outputs.image_tag }}"
            export GHCR_REGISTRY="${{ env.REGISTRY }}"
            export GHCR_REPO="${{ github.repository_owner }}"

            APP_DIR="/opt/app"
            cd "$APP_DIR"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true

            if [ -f scripts/deploy-vps.sh ]; then
                bash scripts/deploy-vps.sh "$IMAGE_TAG" "${{ github.sha }}" "${{ inputs.reason || 'Manual deployment' }}"
            else
                echo "ERROR: scripts/deploy-vps.sh not found"
                exit 1
            fi

      - name: Post-deploy smoke tests
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            PASS=0; FAIL=0

            test_ep() {
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X "$1" "$2" 2>/dev/null || echo "000")
              if [ "$CODE" = "$3" ]; then echo "  OK: $4 ($CODE)"; PASS=$((PASS+1));
              else echo "  FAIL: $4 (got $CODE, expected $3)"; FAIL=$((FAIL+1)); fi
            }

            test_ep GET "http://127.0.0.1:8011/health" "200" "Content API Health"
            test_ep GET "http://127.0.0.1:3000/" "200" "Frontend Homepage"
            test_ep GET "http://127.0.0.1:8020/health" "200" "Tracking Service Health"
            test_ep GET "http://127.0.0.1:9090/-/healthy" "200" "Prometheus Health"
            test_ep GET "http://127.0.0.1:3030/api/health" "200" "Grafana Health"

            echo "Smoke: $PASS passed, $FAIL failed"
            [ "$FAIL" -eq 0 ] || exit 1

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          command_timeout: 30s
          script: |
            source /opt/app/.env 2>/dev/null || true
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              MESSAGE="✅ Деплой успешен%0AВерсия: ${{ needs.docker.outputs.short_sha }}%0AИнициатор: ${{ github.actor }}"
              curl -s --max-time 15 -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MESSAGE}\"}" > /dev/null 2>&1 || true
            fi

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: false
          command_timeout: 30s
          script: |
            source /opt/app/.env 2>/dev/null || true
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
              MESSAGE="❌ Деплой FAILED%0AВерсия: ${{ needs.docker.outputs.short_sha }}%0AИнициатор: ${{ github.actor }}%0AТребуется ручное вмешательство!"
              curl -s --max-time 15 -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MESSAGE}\"}" > /dev/null 2>&1 || true
            fi

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.docker.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ needs.docker.outputs.short_sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
