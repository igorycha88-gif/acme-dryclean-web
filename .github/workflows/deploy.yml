name: Deploy to Production (Blue-Green)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty for auto)'
        required: false
        type: string
      skip_tests:
        description: 'Skip CI tests'
        required: false
        type: boolean
        default: false

jobs:
  ci-check:
    name: CI - Lint & Type Check
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend/services/content
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        working-directory: backend/services/content
        run: ruff check .

      - name: MyPy type check
        working-directory: backend/services/content
        run: mypy app/ || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            chmod +x scripts/version.sh
            VERSION=$(./scripts/version.sh)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to VPS (Blue-Green)
    needs: [ci-check, calculate-version]
    if: always() && (needs.ci-check.result == 'success' || needs.ci-check.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.calculate-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
        run: |
          echo "=== Deploying v${VERSION} ==="

          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << DEPLOY_SCRIPT
            set -e

            DEPLOY_DIR="/opt/app"
            VERSION="${VERSION}"
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
            RABBITMQ_PASS="${RABBITMQ_PASS}"

            export VERSION POSTGRES_PASSWORD RABBITMQ_PASS

            cd "\$DEPLOY_DIR"

            echo "=== Pulling latest code ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== Running deploy script ==="
            chmod +x scripts/*.sh
            ./scripts/deploy.sh --version "\$VERSION"

            echo "=== Deployment complete ==="
            cat current_env
            cat VERSIONS.md | tail -5
          DEPLOY_SCRIPT

      - name: Create git tag
        run: |
          git tag -a "v${{ needs.calculate-version.outputs.version }}" -m "Deploy v${{ needs.calculate-version.outputs.version }}"
          git push origin "v${{ needs.calculate-version.outputs.version }}" || true
