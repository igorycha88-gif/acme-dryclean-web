name: CI

on:
  workflow_call:
    inputs:
      run-coverage:
        description: "Run tests with coverage"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/services/content/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend/services/content
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy

      - name: Ruff lint
        working-directory: backend/services/content
        run: ruff check .

      - name: MyPy type check
        working-directory: backend/services/content
        run: mypy app/ || true

  frontend-quality:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend Build Verification
    runs-on: ubuntu-latest
    needs: frontend-quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check standalone output
        run: |
          if [ ! -d "frontend/.next/standalone" ]; then
            echo "ERROR: .next/standalone not found — check next.config.ts output: 'standalone'"
            exit 1
          fi
          echo "Build size: $(du -sh frontend/.next | cut -f1)"
          echo "Standalone size: $(du -sh frontend/.next/standalone | cut -f1)"

  backend-build:
    name: Backend Build Verification
    runs-on: ubuntu-latest
    needs: backend-quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/content
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
