global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "tracking"
    static_configs:
      - targets: ["tracking:8020"]
    metrics_path: /metrics

  - job_name: "content"
    static_configs:
      - targets: ["content:8011"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
